name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Files
        run: ls

      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t url-shortener .
