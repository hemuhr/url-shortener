<!DOCTYPE html>
<html>
<head>
  <title>URL Shortener</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 400px;
      margin: 120px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      padding: 12px 20px;
      background: #2575fc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1a5edb;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      color: #2c5282;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>URL Shortener</h1>

  <input type="text" id="url" placeholder="Enter long URL">

  <button onclick="shorten()">Shorten URL</button>

  <p id="result"></p>
</div>

<script>
async function shorten() {
  let url = document.getElementById("url").value;

  let res = await fetch('/shorten', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  });

  let data = await res.json();

  document.getElementById("result").innerHTML =
    "<a href='" + data.shortUrl + "' target='_blank'>" + data.shortUrl + "</a>";
}
</script>

</body>
</html>
